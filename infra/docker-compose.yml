services:
  postgres:
    image: postgres:16
    container_name: vendelo_postgres
    environment:
      POSTGRES_USER: vendelo
      POSTGRES_PASSWORD: vendelo
      POSTGRES_DB: vendelo
    ports:
      - "5434:5432"
    volumes:
      - vendelo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendelo -d vendelo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vendelo_pgdata:
