repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check
        language: system
        types: [python]
      - id: black
        name: black
        entry: black --check
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: mypy app
        language: system
        pass_filenames: false
        types: [python]
