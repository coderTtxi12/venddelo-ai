include:
  - path: ./infra/docker-compose.yml

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vendelo_api
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://vendelo:vendelo@postgres:5432/vendelo
      DATABASE_URL_TEST: postgresql+psycopg://vendelo:vendelo@postgres:5432/vendelo_test
      REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vendelo_frontend
    env_file:
      - path: ./frontend/.env.local
        required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET: ${NEXT_PUBLIC_SUPABASE_STORAGE_BUCKET:-assets}
      NEXT_PUBLIC_MENU_PUBLIC_DOMAIN: ${NEXT_PUBLIC_MENU_PUBLIC_DOMAIN:-localhost}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID: ${NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID:-}
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  delivery-dashboard:
    build:
      context: ./delivery-dashboard
      dockerfile: Dockerfile
    container_name: vendelo_delivery_dashboard
    env_file:
      - path: ./delivery-dashboard/.env.local
        required: false
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_DELIVERY_APP_URL:-http://localhost:3001}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      WATCHPACK_POLLING: "true"
    ports:
      - "3001:3000"
    volumes:
      - ./delivery-dashboard:/app
      - delivery_dashboard_node_modules:/app/node_modules
      - delivery_dashboard_next:/app/.next
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  frontend_node_modules:
  frontend_next:
  delivery_dashboard_node_modules:
  delivery_dashboard_next:
